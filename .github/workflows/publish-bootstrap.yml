name: Publish bootstrap (one-shot)

# Temporary, manually-triggered workflow to perform the FIRST crates.io
# publish of v0.1.0. release-plz refuses to auto-publish when a version's
# git tag exists but the crate is missing from the registry (the state
# sift was left in by the earlier versioning-only release). This runs
# `cargo publish` leaf-first to reconcile that; afterwards release-plz
# handles all future releases and this file should be deleted.
#
# Run: gh workflow run publish-bootstrap.yml --repo brevity1swos/sift

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish v0.1.0 (leaf-first)
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # siftcore / sift-render / sift-hook are already on crates.io from
      # the first run; only sift-tui remains (its publish failed on an
      # out-of-crate include_str!, fixed in build: bundle agent-guide.md).
      - run: cargo publish -p sift-tui
