name: Release

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          # No CARGO_REGISTRY_TOKEN: crates.io publishing is disabled
          # (publish = false in release-plz.toml). release-plz only
          # manages version bumps, CHANGELOG, git tags, and GitHub
          # Releases. Add the token + flip publish = true to ship to
          # crates.io later.
