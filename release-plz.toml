# release-plz.toml — version + changelog automation + crates.io publish.
#
# Posture (updated 2026-06-06): publish ENABLED. The crate rename landed
# (binary crate sift-tui, siftcore, sift-render lib, sift-hook), every
# crate carries the required description + metadata, and path deps have
# version fields. release-plz publishes all four members leaf-first
# (siftcore -> sift-render/sift-hook -> sift-tui) using the
# CARGO_REGISTRY_TOKEN secret (see release-plz.yml).
#
# release_commits mirrors agx/ccr: only feat/fix/perf/refactor and
# docs(readme) warrant a release PR. chore/style/test/ci/build and
# generic docs: are excluded as internal plumbing.

[workspace]
changelog_config = "cliff.toml"
allow_dirty = true
git_release_enable = true
git_tag_enable = true
publish = true
release_commits = "^(feat|fix|perf|refactor|docs?\\(readme\\))[(:!]"
